<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Bots — Number Bonds to 10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap');
:root{
  --paper:#fdfaf4;--line:#b8d0ec;--ink:#1a2a4a;
  --faint:#9ab0c8;--stamp:#c0392b;--bolt:#7a6a50;
  --shadow:rgba(30,50,80,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Andika','Varela Round',sans-serif;background:var(--paper);color:var(--ink);height:100vh;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;}
#paper-bg{position:fixed;inset:0;z-index:0;pointer-events:none;}

.screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;overflow:auto;}
.screen.hidden{display:none;}

/* ── START ── */
.start-logo{font-size:2.8rem;font-weight:700;color:var(--ink);letter-spacing:3px;text-align:center;line-height:1.1;}
.start-logo em{color:var(--stamp);font-style:normal;}
.start-sub{font-size:0.78rem;font-weight:700;letter-spacing:4px;color:var(--faint);text-transform:uppercase;}
.start-divider{width:180px;height:1.5px;background:var(--line);flex-shrink:0;}
.start-section-label{font-size:0.75rem;font-weight:700;letter-spacing:3px;color:var(--faint);text-transform:uppercase;}
.opt-row{display:flex;gap:10px;}
.start-opt{
  min-width:58px;height:58px;padding:0 10px;
  border-radius:6px;border:2px solid var(--line);background:white;
  font-family:'Andika',sans-serif;font-size:0.95rem;font-weight:700;color:var(--ink);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  box-shadow:3px 3px 0 var(--shadow);transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1);
  text-align:center;line-height:1.1;
}
.start-opt:hover{transform:scale(1.06);}
.start-opt.selected{border-color:var(--stamp);color:var(--stamp);box-shadow:3px 3px 0 rgba(192,57,43,0.18);transform:scale(1.09);}
.start-opt .opt-icon{font-size:1.4rem;line-height:1;}
.start-opt .opt-label{font-size:0.72rem;letter-spacing:1px;}
.start-btn{font-family:'Andika',sans-serif;font-size:1.1rem;font-weight:700;border:2.5px solid var(--ink);border-radius:6px;padding:11px 46px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;background:var(--ink);color:var(--paper);box-shadow:4px 5px 0 var(--bolt);transition:transform 0.12s,box-shadow 0.12s;}
.start-btn:active{transform:translate(2px,3px);box-shadow:2px 2px 0 var(--bolt);}

/* ── GAME ── */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}
header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 18px;border-bottom:2px solid var(--line);flex-shrink:0;background:rgba(253,250,244,0.95);}
.logo{font-size:1.2rem;font-weight:700;letter-spacing:2px;}
.logo em{color:var(--stamp);font-style:normal;}
.header-right{display:flex;align-items:center;gap:12px;}
.prog-row{display:flex;gap:4px;flex-wrap:wrap;max-width:220px;}
.prog-pip{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--line);background:white;transition:all 0.3s;}
.prog-pip.done{background:var(--stamp);border-color:var(--stamp);animation:pipPop .35s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes pipPop{from{transform:scale(0);}to{transform:scale(1);}}
.score-badge{font-size:0.82rem;font-weight:700;border:2px solid var(--ink);border-radius:4px;padding:3px 10px;background:white;box-shadow:2px 2px 0 var(--shadow);white-space:nowrap;}
.mode-badge{font-size:0.68rem;font-weight:700;letter-spacing:1px;border:1.5px solid var(--faint);border-radius:4px;padding:2px 8px;color:var(--faint);white-space:nowrap;}

/* ── MAIN PLAY AREA — robot left, tile panel right in choose-10 ── */
#play-area{flex:1;display:flex;flex-direction:row;min-height:0;overflow:hidden;}

/* Robot stage — always present */
#stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;overflow:hidden;padding:4px 6px 8px;}
#robot-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;width:100%;}
#robot-svg-wrap svg{max-height:100%;max-width:100%;width:auto;display:block;}
#eq-label{flex-shrink:0;font-size:0.95rem;font-weight:700;letter-spacing:1px;color:var(--faint);border:1.5px dashed var(--line);border-radius:5px;padding:4px 10px 4px 16px;background:white;box-shadow:2px 2px 0 var(--shadow);white-space:nowrap;margin-top:4px;display:flex;align-items:center;}
#eq-label .n{color:var(--ink);font-size:1.1rem;}


/* ── RIGHT TILE PANEL (choose-10 mode) ──
   Tiles sit directly on the paper — transparent, no borders, no scroll.
   3×3 grid fills the full panel height with equal rows.
── */
#tile-panel{
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:stretch;
  width:36%;
  flex-shrink:0;
  min-height:0;
  padding:6px 12px 6px 4px;
  overflow:hidden;
  background:transparent;
  border:none;
}
#tile-panel.visible{display:flex;}

#tile-panel-label{
  font-size:0.58rem;font-weight:700;letter-spacing:3px;
  color:var(--faint);text-transform:uppercase;
  margin-bottom:4px;flex-shrink:0;text-align:center;
}

/* Grid: 3 cols × 3 rows, equal sizing, fills available height */
#tile-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:6px;
  flex:1;
  min-height:0;
  width:100%;
  /* bottom padding gives room for the number badge below each tile */
  padding-bottom:16px;
}

/* Each cell: fill grid area, position:relative for badge */
.tile-btn{
  cursor:pointer;
  border:none;
  background:transparent;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:none;
  transition:transform .15s, filter .15s, opacity .15s;
  width:100%;
  height:100%;
  min-height:0;
  position:relative;
  overflow:visible;
}
.tile-btn:hover{
  transform:translateY(-4px) scale(1.09);
  filter:drop-shadow(0 5px 10px rgba(30,50,80,0.28));
  z-index:5;
}
.tile-btn:active{transform:scale(0.92);}
.tile-btn.used{
  opacity:0.18;pointer-events:none;filter:grayscale(0.95);
}

/* SVG: always same aspect ratio box (2 cols × 5 rows = 2:5 ratio).
   All tiles rendered into this same viewBox so they're identical size. */
.tile-btn svg{
  display:block;
  width:100%;
  height:100%;
  min-height:0;
  object-fit:contain;
}

/* Number badge — sits on top of the tile, centred */
.tile-label{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border:2.5px solid var(--ink);
  border-radius:50%;
  width:26px; height:26px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Andika',sans-serif;
  font-size:0.9rem;font-weight:700;
  color:var(--ink);
  line-height:1;
  box-shadow:0 2px 4px rgba(30,50,80,0.18);
  z-index:4;
  pointer-events:none;
  white-space:nowrap;
}

/* ── WRONG ── */
#wrong-badge{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;opacity:0;transition:opacity .15s;}
#wrong-badge.show{opacity:1;}
.wb-inner{background:white;border:3px solid var(--stamp);border-radius:8px;padding:6px 22px;font-size:1.3rem;font-weight:700;color:var(--stamp);box-shadow:3px 4px 0 rgba(192,57,43,0.18);animation:badgePop .3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes badgePop{from{transform:scale(0.4);}to{transform:scale(1);}}

/* ── VICTORY ── */
#victory{display:none;position:fixed;inset:0;z-index:300;background:var(--paper);flex-direction:column;align-items:center;justify-content:center;gap:14px;overflow:hidden;padding:20px;}
#victory.show{display:flex;}
.v-stamp{font-size:2.2rem;font-weight:700;letter-spacing:3px;color:var(--stamp);text-align:center;border:4px solid var(--stamp);border-radius:8px;padding:8px 28px;transform:rotate(-3deg);box-shadow:4px 5px 0 rgba(192,57,43,0.15);animation:stampIn .45s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes stampIn{from{transform:rotate(-3deg) scale(0.2);opacity:0;}to{transform:rotate(-3deg) scale(1);opacity:1;}}
.v-score{font-size:1.4rem;font-weight:700;color:var(--ink);}
.v-sub{font-size:0.8rem;color:var(--faint);font-weight:700;letter-spacing:2px;}
.v-btn{font-family:'Andika',sans-serif;font-size:1rem;font-weight:700;border:2.5px solid var(--ink);border-radius:5px;padding:10px 40px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;background:var(--ink);color:var(--paper);box-shadow:4px 5px 0 var(--bolt);transition:transform .12s,box-shadow .12s;margin-top:4px;}
.v-btn:active{transform:translate(2px,3px);box-shadow:2px 2px 0 var(--bolt);}
.cf{position:absolute;border-radius:2px;animation:cfFall var(--cd) ease-in forwards;}
@keyframes cfFall{0%{opacity:1;transform:translate(0,0) rotate(0deg);}100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(540deg);}}
@keyframes cellPop{0%{transform:scale(0.2);opacity:0;}70%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}

/* ── SCIENTIST CHARACTER — bigger, left side, higher up ── */
#scientist-wrap{
  position:fixed;
  bottom:0; left:62px;
  z-index:20;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;
  transition:transform .4s cubic-bezier(0.34,1.2,0.64,1);
}
#scientist-wrap.hide{transform:translateY(108%);}
#scientist-bubble{
  position:relative;background:white;
  border:3px solid var(--ink);border-radius:16px;
  padding:10px 16px;max-width:220px;min-width:160px;
  font-family:'Andika',sans-serif;
  font-size:0.92rem;font-weight:700;color:var(--ink);line-height:1.4;
  text-align:center;box-shadow:4px 4px 0 var(--shadow);
  margin-bottom:4px;
  animation:bubblePop .35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes bubblePop{from{transform:scale(0.5) translateY(8px);opacity:0;}to{transform:scale(1);opacity:1;}}
#scientist-bubble::after{
  content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:var(--ink);
}
#scientist-bubble::before{
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:white;z-index:1;
}

/* ── LISTEN BUTTON — inline with equation ── */
#listen-btn{
  background:none;border:none;cursor:pointer;
  font-size:1.2rem;padding:0 0 0 8px;
  line-height:1;vertical-align:middle;
  opacity:0.55;transition:opacity .15s,transform .12s;
  flex-shrink:0;
}
#listen-btn:hover{opacity:1;transform:scale(1.15);}
#listen-btn:active{transform:scale(0.9);}
#listen-btn.speaking{opacity:1;animation:listenPulse .4s ease-in-out infinite alternate;}
@keyframes listenPulse{from{transform:scale(1);}to{transform:scale(1.25);}}
</style>
</head>
<body>
<canvas id="paper-bg"></canvas>

<!-- ══ START ══ -->
<div id="start-screen" class="screen">
  <div class="start-logo">NUMBER<br><em>BOTS</em></div>
  <div class="start-sub">Number bonds to 10</div>
  <div id="start-robot" style="flex-shrink:0;pointer-events:none;"></div>
  <div class="start-divider"></div>
  <div class="start-section-label">Rounds</div>
  <div class="opt-row" id="rounds-picker">
    <button class="start-opt" data-n="5"><span class="opt-label">5</span></button>
    <button class="start-opt selected" data-n="10"><span class="opt-label">10</span></button>
    <button class="start-opt" data-n="15"><span class="opt-label">15</span></button>
  </div>
  <div class="start-section-label">Difficulty</div>
  <div class="opt-row" id="mode-picker">
    <button class="start-opt selected" data-mode="2">
      <span class="opt-icon">🤜🤛</span>
      <span class="opt-label">Choose 2</span>
    </button>
    <button class="start-opt" data-mode="10">
      <span class="opt-icon">🔢</span>
      <span class="opt-label">Choose 10</span>
    </button>
  </div>
  <button class="start-btn" id="start-btn">▶ POWER UP</button>
</div>

<!-- ══ GAME ══ -->
<div id="app">
  <header>
    <div class="logo">NUMBER<em>BOTS</em></div>
    <div class="header-right">
      <div class="mode-badge" id="mode-badge">CHOOSE 2</div>
      <div class="prog-row" id="prog-row"></div>
      <div class="score-badge">⚡ <span id="score-val">0</span></div>
    </div>
  </header>
  <!-- play-area contains robot stage + optional right panel -->
  <div id="play-area">
    <div id="stage">
      <div id="robot-svg-wrap"></div>
      <div id="eq-label">
        <span class="n" id="eq-n">?</span> + <span class="n" id="eq-blank">?</span> = <span class="n">10</span>
        <button id="listen-btn" title="Hear the question again">🔊</button>
      </div>
    </div>
    <!-- Right panel: choose-10 tiles -->
    <div id="tile-panel">
      <div id="tile-panel-label">Choose the missing piece</div>
      <div id="tile-grid"></div>
    </div>
  </div>
</div>

<div id="wrong-badge"><div class="wb-inner" id="wrong-text">WRONG!</div></div>

<!-- ── SCIENTIST CHARACTER ── -->
<div id="scientist-wrap" class="hide">
  <div id="scientist-bubble" id="scientist-speech">Great Scott!</div>
  <div id="scientist-svg"></div>
</div>


<div id="victory">
  <div id="v-robot-wrap" style="pointer-events:none;"></div>
  <div class="v-stamp">MISSION<br>COMPLETE!</div>
  <div class="v-score">Score: <span id="v-score-val">0</span> ⚡</div>
  <div class="v-sub">ALL BONDS SOLVED</div>
  <button class="v-btn" onclick="location.reload()">⟳ NEW MISSION</button>
</div>

<script>
/* ═══════════════════════════════════════════════
   NUMICON DATA
═══════════════════════════════════════════════ */
const NI_COL={1:'#f97316',2:'#bae6fd',3:'#fde047',4:'#2dd4bf',5:'#ef4444',6:'#0d9488',7:'#f472b6',8:'#4ade80',9:'#a855f7',10:'#2563eb'};
const NI_STR={1:'#c2410c',2:'#0ea5e9',3:'#a16207',4:'#0f766e',5:'#b91c1c',6:'#0f766e',7:'#db2777',8:'#16a34a',9:'#7e22ce',10:'#1e3a8a'};
const NI_CELLS={
  1:[[0,0]],2:[[0,0],[1,0]],3:[[0,0],[1,0],[0,1]],4:[[0,0],[1,0],[0,1],[1,1]],
  5:[[0,0],[1,0],[0,1],[1,1],[0,2]],6:[[0,0],[1,0],[0,1],[1,1],[0,2],[1,2]],
  7:[[0,0],[1,0],[0,1],[1,1],[0,2],[1,2],[0,3]],8:[[0,0],[1,0],[0,1],[1,1],[0,2],[1,2],[0,3],[1,3]],
  9:[[0,0],[1,0],[0,1],[1,1],[0,2],[1,2],[0,3],[1,3],[0,4]],
  10:[[0,0],[1,0],[0,1],[1,1],[0,2],[1,2],[0,3],[1,3],[0,4],[1,4]],
};
function niW(n,cs){return(Math.max(...NI_CELLS[n].map(c=>c[0]))+1)*cs;}
function niH(n,cs){return(Math.max(...NI_CELLS[n].map(c=>c[1]))+1)*cs;}
function niMarkup(n,cs,sw=2.5){
  const cells=NI_CELLS[n],col=NI_COL[n],str=NI_STR[n],cr=cs*0.22,hr=cs*0.30;
  let o='';
  cells.forEach(([c,r])=>{
    const x=c*cs,y=r*cs;
    o+=`<rect x="${x+1}" y="${y+1}" width="${cs-2}" height="${cs-2}" rx="${cr}" fill="${col}" stroke="${str}" stroke-width="${sw}"/>`;
    o+=`<rect x="${x+3}" y="${y+3}" width="${cs-6}" height="${cs*0.30}" rx="${cr*0.5}" fill="rgba(255,255,255,0.28)"/>`;
    const cx=x+cs/2,cy=y+cs/2;
    o+=`<circle cx="${cx}" cy="${cy}" r="${hr}" fill="rgba(0,0,0,0.20)"/>`;
    o+=`<circle cx="${cx-hr*0.28}" cy="${cy-hr*0.3}" r="${hr*0.30}" fill="rgba(255,255,255,0.32)"/>`;
  });
  return o;
}

/* ═══════════════════════════════════════════════
   PALETTES
═══════════════════════════════════════════════ */
const PAL=[
  {body:'#dbeafe',head:'#93c5fd',bolt:'#1d4ed8',acc:'#f97316',ant:'#ef4444'},
  {body:'#dcfce7',head:'#86efac',bolt:'#15803d',acc:'#a855f7',ant:'#f472b6'},
  {body:'#fef3c7',head:'#fcd34d',bolt:'#92400e',acc:'#2563eb',ant:'#0d9488'},
  {body:'#fce7f3',head:'#f9a8d4',bolt:'#9d174d',acc:'#4ade80',ant:'#f97316'},
  {body:'#ede9fe',head:'#c4b5fd',bolt:'#5b21b6',acc:'#ef4444',ant:'#fbbf24'},
  {body:'#cffafe',head:'#67e8f9',bolt:'#0e7490',acc:'#f472b6',ant:'#a855f7'},
  {body:'#fee2e2',head:'#fca5a5',bolt:'#991b1b',acc:'#4ade80',ant:'#60a5fa'},
  {body:'#d1fae5',head:'#6ee7b7',bolt:'#065f46',acc:'#f97316',ant:'#db2777'},
  {body:'#fff7ed',head:'#fdba74',bolt:'#9a3412',acc:'#2563eb',ant:'#4ade80'},
  {body:'#f0fdf4',head:'#86efac',bolt:'#166534',acc:'#a855f7',ant:'#ef4444'},
];
function srng(s){let x=s^0xdeadbeef;return()=>{x=Math.imul(x^x>>>17,x*0x45d9f3b^x>>>7);return(x>>>0)/0xffffffff;};}
function mkCfg(level){
  const r=srng(level*6271+99);
  return{p:PAL[level%PAL.length],antCount:r()>0.45?1:2,eye:Math.floor(r()*3),mouth:Math.floor(r()*4),ear:Math.floor(r()*3)};
}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
const VW=700, CS=52;

function layout(given,lVal,rVal,mode){
  const CX=VW/2, BW=2*CS, BH=5*CS, BX=CX-BW/2, BY=155;
  const HW=124, HH=88, HX=CX-HW/2, HY=BY-HH-16;
  const NKW=34, NKH=16, NKX=CX-17, NKY=BY-NKH;
  const AY1=BY+CS*0.6, ALEN=170, AW=20;
  const LX1=BX, RX1=BX+BW, LX2=BX-ALEN, RX2=BX+BW+ALEN;
  const AY2=AY1+22;
  const HW2=38, HH2=22;
  const LHX=LX2-HW2/2, LHY=AY2-HH2/2;
  const RHX=RX2-HW2/2, RHY=AY2-HH2/2;
  const NCS=46;
  const LW=mode===2?niW(lVal,NCS):0, LH=mode===2?niH(lVal,NCS):0;
  const RW=mode===2?niW(rVal,NCS):0, RH=mode===2?niH(rVal,NCS):0;
  const LNX=LX2-LW/2, LNY=LHY+HH2+6;
  const RNX=RX2-RW/2, RNY=RHY+HH2+6;
  const LGW=28, LGH=46, FW=46, FH=20;
  const LL=BX+BW*0.17, LR=BX+BW*0.55;
  const LGY=BY+BH, FY=LGY+LGH;
  const armBottom=mode===2?Math.max(LNY+LH,RNY+RH):FY;
  const VH=Math.max(armBottom+36,FY+FH+12);
  return{CX,BW,BH,BX,BY,HW,HH,HX,HY,NKW,NKH,NKX,NKY,
    AY1,AY2,ALEN,AW,LX1,RX1,LX2,RX2,HW2,HH2,LHX,LHY,RHX,RHY,
    NCS,LW,LH,RW,RH,LNX,LNY,RNX,RNY,
    LGW,LGH,FW,FH,LL,LR,LGY,FY,VH};
}

/* ═══════════════════════════════════════════════
   DRAW ROBOT
   Ghost fix: chest decorations now only go in the
   HEAD area or outside the body frame entirely —
   never inside the numicon cell grid.
═══════════════════════════════════════════════ */
function drawRobot(c,given,lVal,rVal,mode,{hideL=false,hideR=false,filled=false,dancing=false,interactive=false}={}){
  const p=c.p;
  const L=layout(given,lVal,rVal,mode);
  const{CX,BW,BH,BX,BY,HW,HH,HX,HY,NKW,NKH,NKX,NKY,
    AY1,AY2,ALEN,AW,LX1,RX1,LX2,RX2,HW2,HH2,LHX,LHY,RHX,RHY,
    NCS,LW,LH,RW,RH,LNX,LNY,RNX,RNY,
    LGW,LGH,FW,FH,LL,LR,LGY,FY,VH}=L;

  const answer=10-given;
  const gCells=NI_CELLS[given];

  /* ── BODY FRAME ──
     ONLY draws the outer rect + cell contents.
     No decorations here — that prevented ghost cell bleeding. */
  function bodyFrame(){
    let o='';
    // Outer body shell — plain, no decorations overlapping cells
    o+=`<rect x="${BX-2}" y="${BY-2}" width="${BW+4}" height="${BH+4}" rx="12" fill="rgba(0,0,0,0.06)"/>`;
    o+=`<rect x="${BX-1}" y="${BY-1}" width="${BW+2}" height="${BH+2}" rx="11" fill="${p.body}" stroke="${p.bolt}" stroke-width="3"/>`;
    // Draw each of the 10 cells cleanly
    for(let row=0;row<5;row++){
      for(let col=0;col<2;col++){
        const x=BX+col*CS, y=BY+row*CS;
        const inGiven=gCells.some(([gc,gr])=>gc===col&&gr===row);
        if(inGiven){
          o+=cell(x,y,given,false);
        } else if(filled){
          o+=cell(x,y,answer,true);
        } else {
          // Ghost gap — just a subtle dashed outline, nothing inside
          o+=`<rect x="${x+5}" y="${y+5}" width="${CS-10}" height="${CS-10}" rx="7"
            fill="none" stroke="rgba(100,140,200,0.28)" stroke-width="1.5" stroke-dasharray="5,4"/>`;
        }
      }
    }
    // Thin grid lines
    o+=`<line x1="${CX}" y1="${BY}" x2="${CX}" y2="${BY+BH}" stroke="${p.bolt}" stroke-width="0.8" opacity="0.2"/>`;
    for(let r=1;r<5;r++) o+=`<line x1="${BX}" y1="${BY+r*CS}" x2="${BX+BW}" y2="${BY+r*CS}" stroke="${p.bolt}" stroke-width="0.8" opacity="0.2"/>`;
    return o;
  }

  function cell(x,y,n,pop){
    const tf=pop?`style="animation:cellPop .38s cubic-bezier(0.34,1.56,0.64,1) both;transform-origin:${x+CS/2}px ${y+CS/2}px;"`:' ';
    let o=`<rect x="${x+2}" y="${y+2}" width="${CS-4}" height="${CS-4}" rx="9" fill="${NI_COL[n]}" stroke="${NI_STR[n]}" stroke-width="2.5" ${tf}/>`;
    o+=`<rect x="${x+4}" y="${y+4}" width="${CS-8}" height="${CS*0.28}" rx="5" fill="rgba(255,255,255,0.30)" pointer-events="none"/>`;
    const cx=x+CS/2,cy=y+CS/2,hr=CS*0.26;
    o+=`<circle cx="${cx}" cy="${cy}" r="${hr}" fill="rgba(0,0,0,0.17)" pointer-events="none"/>`;
    o+=`<circle cx="${cx-hr*.28}" cy="${cy-hr*.3}" r="${hr*.32}" fill="rgba(255,255,255,0.35)" pointer-events="none"/>`;
    return o;
  }

  function rivet(bx,by,r=5){
    return `<circle cx="${bx}" cy="${by}" r="${r}" fill="${p.bolt}" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
            <circle cx="${bx-r*.3}" cy="${by-r*.3}" r="${r*.36}" fill="rgba(255,255,255,0.45)"/>`;
  }

  function accordionArm(x1,y1,x2,y2,segments=4){
    const dx=(x2-x1)/segments, dy=(y2-y1)/segments;
    const perp=11;
    let d=`M${x1},${y1}`;
    for(let i=1;i<=segments;i++){
      const mx=x1+dx*(i-.5), my=y1+dy*(i-.5);
      const side=(i%2===0?1:-1)*perp;
      d+=` Q${mx},${my+side} ${x1+dx*i},${y1+dy*i}`;
    }
    return `<path d="${d}" fill="none" stroke="${p.body}" stroke-width="14" stroke-linecap="round"/>
            <path d="${d}" fill="none" stroke="${p.bolt}" stroke-width="15" stroke-linecap="round" opacity="0.10"/>
            <path d="${d}" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="5" stroke-linecap="round"/>`;
  }

  const dCSS=dancing?`<style>
@keyframes bB{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
@keyframes hW{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-14deg);}75%{transform:rotate(14deg);}}
@keyframes aL{0%,100%{transform:rotate(0deg);}35%{transform:rotate(-36deg);}80%{transform:rotate(24deg);}}
@keyframes aR{0%,100%{transform:rotate(0deg);}35%{transform:rotate(36deg);}80%{transform:rotate(-24deg);}}
@keyframes anW{0%,100%{transform:rotate(0deg);}40%{transform:rotate(-26deg);}80%{transform:rotate(26deg);}}
#db{animation:bB .36s ease-in-out infinite;}
#dh{animation:hW .36s ease-in-out infinite;transform-origin:${CX}px ${HY+HH}px;}
#dal{animation:aL .36s ease-in-out infinite;transform-origin:${LX1}px ${AY1}px;}
#dar{animation:aR .36s ease-in-out infinite;transform-origin:${RX1}px ${AY1}px;}
#dant{animation:anW .26s ease-in-out infinite;transform-origin:${CX}px ${HY}px;}
</style>`:'';

  function head(){
    let o='';
    // Ears
    if(c.ear===1){
      o+=`<rect x="${HX-20}" y="${HY+HH*.22}" width="20" height="${HH*.5}" rx="6" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>`;
      o+=`<rect x="${HX-16}" y="${HY+HH*.33}" width="10" height="${HH*.28}" rx="3" fill="${p.acc}" opacity="0.75"/>`;
      o+=`<rect x="${HX+HW}" y="${HY+HH*.22}" width="20" height="${HH*.5}" rx="6" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>`;
      o+=`<rect x="${HX+HW+4}" y="${HY+HH*.33}" width="10" height="${HH*.28}" rx="3" fill="${p.acc}" opacity="0.75"/>`;
    } else if(c.ear===2){
      o+=`<circle cx="${HX-11}" cy="${HY+HH*.5}" r="14" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>`;
      o+=`<circle cx="${HX-11}" cy="${HY+HH*.5}" r="7" fill="${p.acc}" opacity="0.65"/>`;
      o+=`<circle cx="${HX+HW+11}" cy="${HY+HH*.5}" r="14" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>`;
      o+=`<circle cx="${HX+HW+11}" cy="${HY+HH*.5}" r="7" fill="${p.acc}" opacity="0.65"/>`;
    }
    // Head box
    o+=`<rect x="${HX-1}" y="${HY-1}" width="${HW+2}" height="${HH+2}" rx="17" fill="rgba(0,0,0,0.07)"/>`;
    o+=`<rect x="${HX}" y="${HY}" width="${HW}" height="${HH}" rx="16" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>`;
    o+=`<rect x="${HX+4}" y="${HY+4}" width="${HW-8}" height="${HH*.30}" rx="13" fill="rgba(255,255,255,0.22)"/>`;
    // Eyes
    const ECX=HX+HW/2, ECY=HY+HH*.43;
    if(c.eye===0){
      o+=`<circle cx="${ECX}" cy="${ECY}" r="21" fill="white" stroke="${p.bolt}" stroke-width="2"/>`;
      o+=`<circle cx="${ECX+2}" cy="${ECY+2}" r="13" fill="${p.acc}"/>`;
      o+=`<circle cx="${ECX+2}" cy="${ECY+2}" r="7" fill="#1a1a2e"/>`;
      o+=`<circle cx="${ECX+7}" cy="${ECY-4}" r="5.5" fill="rgba(255,255,255,0.9)"/>`;
      o+=`<circle cx="${ECX-5}" cy="${ECY+7}" r="2.5" fill="rgba(255,255,255,0.45)"/>`;
    } else if(c.eye===1){
      o+=`<rect x="${HX+8}" y="${ECY-12}" width="${HW-16}" height="24" rx="8" fill="#1a1a2e" stroke="${p.bolt}" stroke-width="1.5"/>`;
      o+=`<rect x="${HX+13}" y="${ECY-6}" width="${HW-26}" height="10" rx="5" fill="${p.acc}" opacity="0.55"/>`;
      o+=`<rect x="${HX+15}" y="${ECY-4}" width="${HW-30}" height="4" rx="3" fill="rgba(255,255,255,0.30)"/>`;
    } else {
      [HX+HW*.27, HX+HW*.73].forEach(ex=>{
        o+=`<circle cx="${ex}" cy="${ECY}" r="17" fill="white" stroke="${p.bolt}" stroke-width="2"/>`;
        o+=`<circle cx="${ex+1}" cy="${ECY+1}" r="10" fill="${p.acc}"/>`;
        o+=`<circle cx="${ex+1}" cy="${ECY+1}" r="5.5" fill="#1a1a2e"/>`;
        o+=`<circle cx="${ex+5}" cy="${ECY-4}" r="3.5" fill="rgba(255,255,255,0.9)"/>`;
        o+=`<circle cx="${ex-4}" cy="${ECY+5}" r="2" fill="rgba(255,255,255,0.45)"/>`;
      });
    }
    // Mouth
    const MX=HX+HW*.15, MY=HY+HH*.79, MW=HW*.70;
    if(c.mouth===0){
      // Big happy grin
      o+=`<path d="M${MX},${MY} Q${MX+MW/2},${MY+16} ${MX+MW},${MY}" fill="none" stroke="${p.bolt}" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>`;
    } else if(c.mouth===1){
      for(let i=0;i<5;i++) o+=`<rect x="${MX+i*MW/5+2}" y="${MY}" width="${MW/5-4}" height="10" rx="3" fill="${p.bolt}" opacity="0.5"/>`;
    } else if(c.mouth===2){
      o+=`<rect x="${MX}" y="${MY+2}" width="${MW}" height="7" rx="3.5" fill="${p.bolt}" opacity="0.5"/>`;
      for(let i=0;i<4;i++) o+=`<rect x="${MX+5+i*MW/4}" y="${MY+2}" width="${MW/4-8}" height="4" rx="1.5" fill="rgba(255,255,255,0.38)"/>`;
    } else {
      let d=`M${MX},${MY+5}`;
      for(let i=0;i<6;i++) d+=` L${MX+(i+.5)*MW/6},${MY+(i%2===0?13:0)}`;
      d+=` L${MX+MW},${MY+5}`;
      o+=`<path d="${d}" fill="none" stroke="${p.bolt}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>`;
    }
    // Head corner rivets
    [[HX+9,HY+9],[HX+HW-9,HY+9],[HX+9,HY+HH-9],[HX+HW-9,HY+HH-9]].forEach(([bx,by])=>o+=rivet(bx,by));
    return o;
  }

  function antenna(){
    let o='';
    const xs=c.antCount===1?[CX]:[HX+HW*.28,HX+HW*.72];
    xs.forEach((ax,i)=>{
      const w=(i%2===0?1:-1)*2;
      o+=`<line x1="${ax}" y1="${HY}" x2="${ax+w}" y2="${HY-36}" stroke="${p.bolt}" stroke-width="3.5" stroke-linecap="round"/>`;
      o+=`<circle cx="${ax+w}" cy="${HY-45}" r="11" fill="${p.ant}" stroke="${p.bolt}" stroke-width="2"/>`;
      o+=`<circle cx="${ax+w-4}" cy="${HY-49}" r="4" fill="rgba(255,255,255,0.6)"/>`;

    return o;
  }

  // Hit rects for choose-2
  const HP=20;
  const hits=(interactive&&mode===2)?`
<rect id="glow-L" x="${LNX-HP}" y="${LNY-HP}" width="${LW+HP*2}" height="${LH+HP*2+18}" rx="10" fill="transparent" stroke="transparent" stroke-width="3" pointer-events="none"/>
<rect id="glow-R" x="${RNX-HP}" y="${RNY-HP}" width="${RW+HP*2}" height="${RH+HP*2+18}" rx="10" fill="transparent" stroke="transparent" stroke-width="3" pointer-events="none"/>
<rect id="hit-L" x="${LNX-HP}" y="${LNY-HP}" width="${LW+HP*2}" height="${LH+HP*2+18}" fill="transparent" style="cursor:pointer;"/>
<rect id="hit-R" x="${RNX-HP}" y="${RNY-HP}" width="${RW+HP*2}" height="${RH+HP*2+18}" fill="transparent" style="cursor:pointer;"/>`:'';

  return `<svg viewBox="0 0 ${VW} ${VH}" xmlns="http://www.w3.org/2000/svg" id="main-robot" style="max-height:100%;max-width:100%;width:auto;display:block;">
${dCSS}
<ellipse cx="${CX}" cy="${VH-4}" rx="90" ry="10" fill="rgba(0,0,0,0.06)"/>
<!-- feet -->
<rect x="${LL-(FW-LGW)/2+2}" y="${FY}" width="${FW}" height="${FH}" rx="9" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>
<rect x="${LL-(FW-LGW)/2+6}" y="${FY+3}" width="${FW-12}" height="6" rx="3" fill="rgba(255,255,255,0.28)" pointer-events="none"/>
<rect x="${LR-(FW-LGW)/2-2}" y="${FY+1}" width="${FW}" height="${FH}" rx="9" fill="${p.head}" stroke="${p.bolt}" stroke-width="2.5"/>
<rect x="${LR-(FW-LGW)/2+2}" y="${FY+4}" width="${FW-12}" height="6" rx="3" fill="rgba(255,255,255,0.28)" pointer-events="none"/>
<g id="db">
  <!-- accordion legs -->
  ${accordionArm(LL+LGW/2,LGY,LL+LGW/2,FY,3)}
  ${accordionArm(LR+LGW/2,LGY+2,LR+LGW/2,FY+1,3)}
  <!-- left arm -->
  <g id="dal">
    ${accordionArm(LX1,AY1,LX2,AY2,4)}
    <rect x="${LHX}" y="${LHY}" width="${HW2}" height="${HH2}" rx="8" fill="${p.head}" stroke="${p.bolt}" stroke-width="2"/>
    ${rivet(LHX+6,LHY+HH2/2,4)}${rivet(LHX+HW2-6,LHY+HH2/2,4)}
    ${mode===2&&!hideL?`<g pointer-events="none" transform="translate(${LNX},${LNY})">${niMarkup(lVal,NCS)}</g>
    <text x="${LX2}" y="${LNY+LH+17}" text-anchor="middle" font-family="Andika,sans-serif" font-weight="700" font-size="18" fill="#9ab0c8" pointer-events="none">${lVal}</text>`:''}
  </g>
  <!-- right arm -->
  <g id="dar">
    ${accordionArm(RX1,AY1,RX2,AY2,4)}
    <rect x="${RHX}" y="${RHY}" width="${HW2}" height="${HH2}" rx="8" fill="${p.head}" stroke="${p.bolt}" stroke-width="2"/>
    ${rivet(RHX+6,RHY+HH2/2,4)}${rivet(RHX+HW2-6,RHY+HH2/2,4)}
    ${mode===2&&!hideR?`<g pointer-events="none" transform="translate(${RNX},${RNY})">${niMarkup(rVal,NCS)}</g>
    <text x="${RX2}" y="${RNY+RH+17}" text-anchor="middle" font-family="Andika,sans-serif" font-weight="700" font-size="18" fill="#9ab0c8" pointer-events="none">${rVal}</text>`:''}
  </g>
  <!-- body — no decorations inside cell area -->
  ${bodyFrame()}
  ${rivet(BX+9,BY+9)}${rivet(BX+BW-9,BY+9)}${rivet(BX+9,BY+BH-9)}${rivet(BX+BW-9,BY+BH-9)}
  <!-- neck -->
  <rect x="${NKX}" y="${NKY}" width="${NKW}" height="${NKH}" rx="6" fill="${p.head}" stroke="${p.bolt}" stroke-width="2"/>
  <g id="dh">${head()}</g>
  <g id="dant">${antenna()}</g>
</g>
${hits}
</svg>`;
}

/* ═══════════════════════════════════════════════
   CHOOSE-10 RIGHT PANEL
   3×3 grid, all 9 tiles visible, no scroll.
   SVGs use viewBox only (no fixed w/h) so CSS controls size.
═══════════════════════════════════════════════ */
function buildPanel(answer){
  const panel=document.getElementById('tile-panel');
  const grid=document.getElementById('tile-grid');
  grid.innerHTML='';
  panel.classList.add('visible');
  // All tiles rendered into the same 2×5 viewBox (same as numicon 10).
  // This makes every tile occupy the same visual space regardless of value.
  const cs=32;
  const VBOX_W=2*cs, VBOX_H=5*cs; // 64×160 — consistent for all
  for(let n=1;n<=9;n++){
    const btn=document.createElement('button');
    btn.className='tile-btn';
    btn.dataset.val=n;
    // Render the numicon in its natural position (top-left of the 2×5 box)
    btn.innerHTML=
      `<svg viewBox="0 0 ${VBOX_W} ${VBOX_H}" xmlns="http://www.w3.org/2000/svg"
        preserveAspectRatio="xMidYMin meet">${niMarkup(n,cs,2)}</svg>
       <span class="tile-label">${n}</span>`;
    btn.addEventListener('click',()=>checkPanel(n,answer));
    grid.appendChild(btn);
  }
}

function hidePanel(){
  const panel=document.getElementById('tile-panel');
  panel.classList.remove('visible');
  const grid=document.getElementById('tile-grid');
  if(grid)grid.innerHTML='';
}

/* ═══════════════════════════════════════════════
   WIRE CLICKS (choose-2)
═══════════════════════════════════════════════ */
function wireClicks(){
  [['L','left'],['R','right']].forEach(([id,side])=>{
    const hit=document.getElementById(`hit-${id}`);
    const glow=document.getElementById(`glow-${id}`);
    if(!hit)return;
    hit.addEventListener('click',()=>check(side));
    hit.addEventListener('mouseenter',()=>{if(glow){glow.setAttribute('fill','rgba(91,155,213,0.15)');glow.setAttribute('stroke','rgba(91,155,213,0.55)');}});
    hit.addEventListener('mouseleave',()=>{if(glow){glow.setAttribute('fill','transparent');glow.setAttribute('stroke','transparent');}});
    hit.addEventListener('touchstart',()=>{if(glow){glow.setAttribute('fill','rgba(91,155,213,0.22)');glow.setAttribute('stroke','rgba(91,155,213,0.65)');}},{passive:true});
    hit.addEventListener('touchend',()=>{if(glow){glow.setAttribute('fill','transparent');glow.setAttribute('stroke','transparent');}},{passive:true});
  });
}

let audioCtx=null;
function audio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(f,d,t,type='square',vol=0.15){
  const ctx=audio(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type;o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.015);
  g.gain.setValueAtTime(vol,t+d-.03);g.gain.linearRampToValueAtTime(0,t+d);
  o.start(t);o.stop(t+d+.01);
}
function playCorrect(){
  const ctx=audio(),now=ctx.currentTime;
  [[523,.09],[659,.09],[784,.09],[1047,.2]].forEach(([f,d],i)=>beep(f,d,now+i*.12));
  setTimeout(()=>beep(1400,.12,audio().currentTime+.02,'sine',.09),560);
}
function playWrong(){
  const ctx=audio(),now=ctx.currentTime;
  [[220,.18],[170,.22]].forEach(([f,d],i)=>beep(f,d,now+i*.2,'sawtooth',.13));
}
function playVictory(){
  const ctx=audio(),now=ctx.currentTime;
  [[523,.1],[659,.1],[784,.1],[1047,.18],[784,.1],[1047,.13],[1047,.24]].forEach(([f,d],i)=>beep(f,d,now+i*.14));
}

/* ── ROBOT VOICE ──
/* ── SCIENTIST'S VOICE — clean, friendly, no distortion ── */
let _voice=null;
function _initVoice(){
  if(!window.speechSynthesis)return;
  const pick=vs=>vs.find(v=>v.name==='Daniel')||vs.find(v=>v.name==='Google UK English Male')||vs.find(v=>v.name.toLowerCase().includes('male')&&v.lang.startsWith('en'))||vs.find(v=>v.lang==='en-GB')||vs.find(v=>v.lang.startsWith('en'))||vs[0]||null;
  const v=speechSynthesis.getVoices();
  if(v.length)_voice=pick(v);
  else speechSynthesis.onvoiceschanged=()=>{_voice=pick(speechSynthesis.getVoices());};
}
_initVoice();

function _say(text,rate=0.9,pitch=1.4){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate;u.pitch=pitch;u.volume=1;u.lang='en-GB';
  if(!_voice){const v=speechSynthesis.getVoices();_voice=v.find(x=>x.lang.startsWith('en'))||v[0]||null;}
  if(_voice)u.voice=_voice;
  speechSynthesis.speak(u);
}

const CORRECT_PHRASES=['Well done!','Correct!','Brilliant!','Nice one!','Perfect!'];
const WRONG_PHRASES=['Try again!','Not that one!','Have another go!'];
let _lastQuestion='';

function speakQuestion(n){
  _lastQuestion=`${n} and what, makes 10?`;
  _say(_lastQuestion,0.9,1.4);
  scientistSay(`Oh no! My robot is broken!\nCan you fix it?`,'question');
}
function speakCorrect(){
  const msg=CORRECT_PHRASES[Math.floor(Math.random()*CORRECT_PHRASES.length)];
  _say(msg,0.9,1.4);
  scientistSay(['MAGNIFICENT!','Incredible!','You fixed it!','EUREKA!'][Math.floor(Math.random()*4)],'correct');
}
function speakWrong(){
  const msg=WRONG_PHRASES[Math.floor(Math.random()*WRONG_PHRASES.length)];
  _say(msg,0.9,1.4);
  scientistSay(['Hmm... not quite!','Try again!','Almost...'][Math.floor(Math.random()*3)],'wrong');
}

let _scientistTimer=null;
function scientistSay(text,mood='question'){
  const wrap=document.getElementById('scientist-wrap');
  const bubble=document.getElementById('scientist-bubble');
  const svgEl=document.getElementById('scientist-svg');
  if(!wrap||!bubble||!svgEl)return;
  if(_scientistTimer)clearTimeout(_scientistTimer);
  bubble.textContent=text;
  bubble.style.animation='none';
  void bubble.offsetWidth;
  bubble.style.animation='';
  svgEl.innerHTML=drawScientist(mood);
  wrap.classList.remove('hide');
  const dur=mood==='question'?4200:3000;
  _scientistTimer=setTimeout(()=>wrap.classList.add('hide'),dur);
}
function _initVoice(){
  if(!window.speechSynthesis)return;
  const pick=vs=>
    vs.find(v=>v.name==='Daniel')||
    vs.find(v=>v.name==='Google UK English Male')||
    vs.find(v=>v.name.toLowerCase().includes('male')&&v.lang.startsWith('en'))||
    vs.find(v=>v.lang==='en-GB')||
    vs.find(v=>v.lang.startsWith('en'))||
    vs[0]||null;
  const v=speechSynthesis.getVoices();
  if(v.length)_voice=pick(v);
  else speechSynthesis.onvoiceschanged=()=>{_voice=pick(speechSynthesis.getVoices());};
}
_initVoice();

/* ═══════════════════════════════════════════════
   PAPER BACKGROUND
═══════════════════════════════════════════════ */
function drawPaper(){
  const c=document.getElementById('paper-bg');
  const W=window.innerWidth,H=window.innerHeight;
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#fdfaf4';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(150,190,230,0.5)';ctx.lineWidth=1;
  for(let y=32;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(215,105,105,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(54,0);ctx.lineTo(54,H);ctx.stroke();
  [H*.15,H*.5,H*.85].forEach(hy=>{
    ctx.beginPath();ctx.arc(22,hy,9,0,Math.PI*2);
    ctx.strokeStyle='rgba(170,150,130,0.35)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(190,175,155,0.25)';ctx.fill();
  });
  ctx.font='bold 10px monospace';ctx.fillStyle='rgba(150,175,200,0.35)';
  ctx.fillText('NUMBERBOTS  //  BONDS TO 10  //  v9.0',62,H-8);
}

/* ═══════════════════════════════════════════════
   GAME
═══════════════════════════════════════════════ */
const G={total:10,round:0,score:0,solved:0,given:0,answer:0,lVal:0,rVal:0,side:'',busy:false,cfg:null,mode:2};

document.querySelectorAll('#rounds-picker .start-opt').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('#rounds-picker .start-opt').forEach(x=>x.classList.remove('selected'));
    this.classList.add('selected');G.total=+this.dataset.n;
  });
});
document.querySelectorAll('#mode-picker .start-opt').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('#mode-picker .start-opt').forEach(x=>x.classList.remove('selected'));
    this.classList.add('selected');G.mode=+this.dataset.mode;
  });
});
document.getElementById('start-btn').addEventListener('click',()=>{
  try{audio().resume();}catch(e){}
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('mode-badge').textContent=G.mode===10?'CHOOSE 10':'CHOOSE 2';
  drawPaper();window.addEventListener('resize',drawPaper);
  updateProg();genQ();
});

// Preview
(()=>{
  const c=mkCfg(3);
  document.getElementById('start-robot').innerHTML=drawRobot(c,4,6,4,2,{});
  const s=document.getElementById('start-robot').querySelector('svg');
  if(s)s.style.maxHeight='120px';
})();

function genQ(){
  G.busy=false;
  G.given=1+Math.floor(Math.random()*9);
  G.answer=10-G.given;
  if(G.mode===2){
    let d;do{d=1+Math.floor(Math.random()*9);}while(d===G.answer);
    if(Math.random()>.5){G.lVal=G.answer;G.rVal=d;G.side='left';}
    else{G.lVal=d;G.rVal=G.answer;G.side='right';}
  }
  G.cfg=mkCfg(G.round);
  document.getElementById('eq-n').textContent=G.given;
  document.getElementById('eq-blank').textContent='?';
  render({interactive:G.mode===2});
  if(G.mode===10){buildPanel(G.answer);} else {hidePanel();}
  speakQuestion(G.given);
}

function render(opts={}){
  document.getElementById('robot-svg-wrap').innerHTML=
    drawRobot(G.cfg,G.given,G.lVal,G.rVal,G.mode,opts);
  if(opts.interactive&&G.mode===2)wireClicks();
}

/* check — choose-2 */
function check(side){
  if(G.busy)return;
  if(side===G.side){
    G.busy=true;
    playCorrect();speakCorrect();
    render({hideL:side==='left',hideR:side==='right'});
    setTimeout(()=>{
      render({hideL:side==='left',hideR:side==='right',filled:true,dancing:true});
      document.getElementById('eq-blank').textContent=G.answer;
      G.score++;G.solved++;
      document.getElementById('score-val').textContent=G.score;
      updateProg();
      setTimeout(()=>{G.round++;G.round>=G.total?victory():genQ();},G.round+1>=G.total?2000:1500);
    },240);
  } else {
    playWrong();speakWrong();
    showWrong();shakeRobot();
    flashGlow(side==='left'?'L':'R');
  }
}

/* check — choose-10 */
function checkPanel(val,answer){
  if(G.busy)return;
  if(val===answer){
    G.busy=true;
    // Mark the correct tile as used (fades out in place)
    document.querySelectorAll('.tile-btn').forEach(b=>{
      if(+b.dataset.val===val) b.classList.add('used');
    });
    playCorrect();speakCorrect();
    // Small pause then fill body + dance — panel stays visible throughout
    setTimeout(()=>{
      render({filled:true,dancing:true});
      document.getElementById('eq-blank').textContent=answer;
      G.score++;G.solved++;
      document.getElementById('score-val').textContent=G.score;
      updateProg();
      // Dance for a beat, then next question (panel rebuilds on genQ)
      setTimeout(()=>{G.round++;G.round>=G.total?victory():genQ();},G.round+1>=G.total?2000:1400);
    },240);
  } else {
    playWrong();speakWrong();
    showWrong();shakeRobot();
    document.querySelectorAll('.tile-btn').forEach(b=>{if(+b.dataset.val===val)b.classList.add('used');});
  }
}

function showWrong(){
  document.getElementById('wrong-text').textContent=['Error!','Try again!','Not that one!'][Math.floor(Math.random()*3)];
  const wb=document.getElementById('wrong-badge');
  wb.classList.add('show');setTimeout(()=>wb.classList.remove('show'),1100);
}
function shakeRobot(){
  const svg=document.getElementById('main-robot');
  if(svg){const f=['-14px','14px','-9px','9px','-4px','4px','0'];f.forEach((x,i)=>setTimeout(()=>{if(svg)svg.style.transform=`translateX(${x})`;},i*65));}
}
function flashGlow(id){
  const g=document.getElementById(`glow-${id}`);
  if(g){g.setAttribute('fill','rgba(220,50,50,0.2)');g.setAttribute('stroke','rgba(220,50,50,0.6)');setTimeout(()=>{g.setAttribute('fill','transparent');g.setAttribute('stroke','transparent');},600);}
}
function updateProg(){
  const row=document.getElementById('prog-row');row.innerHTML='';
  for(let i=0;i<G.total;i++){
    const d=document.createElement('div');
    d.className='prog-pip'+(i<G.solved?' done':'');
    row.appendChild(d);
  }
}
function victory(){
  playVictory();
  setTimeout(()=>{
    _robotFX(2);
    _say('Mission complete! Well done!',1.0,0.1);
    scientistSay('ALL ROBOTS FIXED!\nYou are a genius!','correct');
  },700);
  document.getElementById('v-score-val').textContent=G.score;
  hidePanel();
  document.getElementById('v-robot-wrap').innerHTML=drawRobot(mkCfg(7),10,5,5,2,{filled:true,dancing:true});
  const s=document.getElementById('v-robot-wrap').querySelector('svg');
  if(s){s.style.maxHeight='180px';s.style.pointerEvents='none';}
  document.getElementById('victory').classList.add('show');
  const cols=['#ef4444','#fb923c','#fbbf24','#4ade80','#60a5fa','#2563eb','#a855f7','#f472b6'];
  const v=document.getElementById('victory');
  for(let i=0;i<55;i++){
    const el=document.createElement('div');el.className='cf';
    const ang=Math.random()*Math.PI*2,dist=160+Math.random()*300;
    el.style.cssText=`left:50%;top:38%;background:${cols[i%cols.length]};--cx:${Math.cos(ang)*dist}px;--cy:${Math.sin(ang)*dist+60}px;--cd:${.9+Math.random()*.9}s;border-radius:${Math.random()>.4?'50%':'2px'};width:${8+Math.random()*9}px;height:${8+Math.random()*9}px;z-index:400;`;
    v.appendChild(el);setTimeout(()=>el.remove(),2200);
  }
}

/* ── LISTEN BUTTON wiring ── */
document.getElementById('listen-btn').addEventListener('click',()=>{
  if(!_lastQuestion)return;
  _robotFX(G.given*.08+1.8);
  _say(_lastQuestion,1.0,0.1);
  scientistSay(`Oh no! My robot is broken!\nCan you fix it?`,'question');
  const btn=document.getElementById('listen-btn');
  btn.classList.add('speaking');
  setTimeout(()=>btn.classList.remove('speaking'),1200);
});

drawPaper();window.addEventListener('resize',drawPaper);

// Scientist welcome on game load
setTimeout(()=>scientistSay('Welcome to my laboratory!\nCan you fix my robots?','question'),600);
